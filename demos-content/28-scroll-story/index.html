<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-driven 动画故事 | 星际迷途</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      overflow-x: hidden;
    }
    
    .progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
      width: 0%;
      z-index: 1000;
      transition: width 0.1s;
    }
    
    .scroll-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      animation: bounce 2s infinite;
      z-index: 1000;
    }
    
    @keyframes bounce {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.8; transform: translateX(-50%) translateY(8px); }
    }
    
    .scene {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    
    .scene-content {
      max-width: 600px;
      text-align: center;
      padding: 40px;
      z-index: 2;
    }
    
    .scene h2 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(60px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .scene p {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      line-height: 1.8;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      color: rgba(255,255,255,0.7);
    }
    
    .scene.visible h2,
    .scene.visible p {
      opacity: 1;
      transform: translateY(0);
    }
    
    /* Scene 1: 开场 - 星空 */
    .scene-1 {
      background: linear-gradient(180deg, #0a0a1a 0%, #0f0f2a 100%);
    }
    
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
    }
    
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    
    .scene-1 h2 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    /* Scene 2: 飞船发射 */
    .scene-2 {
      background: linear-gradient(180deg, #0f0f2a 0%, #1a0a2e 50%, #2d1b4e 100%);
    }
    
    .rocket {
      position: absolute;
      bottom: -100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 80px;
      opacity: 0;
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .scene-2.visible .rocket {
      opacity: 1;
      animation: launch 2s 0.5s forwards;
    }
    
    @keyframes launch {
      0% { bottom: -100px; opacity: 1; }
      100% { bottom: 120vh; opacity: 0.3; transform: translateX(-50%) scale(0.5); }
    }
    
    .flame {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 60px;
      background: linear-gradient(180deg, #ff6b35, #f7c600, transparent);
      border-radius: 50% 50% 20% 20%;
      filter: blur(3px);
      animation: flicker 0.1s infinite alternate;
    }
    
    @keyframes flicker {
      0% { height: 50px; }
      100% { height: 70px; }
    }
    
    /* Scene 3: 穿越小行星带 */
    .scene-3 {
      background: radial-gradient(ellipse at center, #2d1b4e 0%, #0a0a1a 100%);
    }
    
    .asteroid-field {
      position: absolute;
      width: 100%;
      height: 100%;
    }
    
    .asteroid {
      position: absolute;
      background: linear-gradient(135deg, #4a4a5a, #2a2a3a);
      border-radius: 50% 40% 60% 50%;
      box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5);
      animation: drift var(--duration) linear infinite;
    }
    
    @keyframes drift {
      0% { transform: translateX(-100vw) rotate(0deg); }
      100% { transform: translateX(100vw) rotate(360deg); }
    }
    
    .scene-3 .scene-content { z-index: 10; }
    
    /* Scene 4: 遇见未知星球 */
    .scene-4 {
      background: linear-gradient(180deg, #0a0a1a 0%, #0d1a2d 100%);
    }
    
    .planet {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e90ff 0%, #0066cc 50%, #003366 100%);
      box-shadow: 
        inset -40px -20px 60px rgba(0,0,0,0.6),
        0 0 80px rgba(30,144,255,0.4);
      opacity: 0;
      transform: scale(0.3);
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .planet::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 50%);
    }
    
    .planet::after {
      content: '';
      position: absolute;
      width: 120%;
      height: 20px;
      background: linear-gradient(90deg, transparent, rgba(255,200,100,0.2), transparent);
      top: 50%;
      left: -10%;
      transform: rotate(-15deg);
      border-radius: 50%;
    }
    
    .scene-4.visible .planet {
      opacity: 1;
      transform: scale(1);
    }
    
    .planet-rings {
      position: absolute;
      width: 450px;
      height: 100px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(75deg);
      border: 3px solid rgba(200,180,150,0.3);
      border-radius: 50%;
      animation: ringPulse 3s ease-in-out infinite;
    }
    
    @keyframes ringPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(200,180,150,0.2); }
      50% { box-shadow: 0 0 40px rgba(200,180,150,0.4); }
    }
    
    /* Scene 5: 结局 */
    .scene-5 {
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a1a 100%);
    }
    
    .telescope {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 120px;
      opacity: 0;
      transition: all 1s 0.5s;
    }
    
    .scene-5.visible .telescope {
      opacity: 0.8;
    }
    
    .message {
      position: absolute;
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      white-space: nowrap;
      opacity: 0;
      transition: all 0.5s;
    }
    
    .scene-5.visible .message {
      opacity: 1;
    }
    
    .message-1 { top: 20%; left: 10%; animation: float 6s 1s ease-in-out infinite; }
    .message-2 { top: 30%; right: 15%; animation: float 8s 2s ease-in-out infinite; }
    .message-3 { top: 50%; left: 20%; animation: float 7s 1.5s ease-in-out infinite; }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    /* Final section */
    .finale {
      min-height: 60vh;
      background: linear-gradient(180deg, #0a0a1a 0%, #111 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }
    
    .finale h2 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: #667eea;
    }
    
    .restart-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: white;
      font-size: 1rem;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(102,126,234,0.5);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .planet { width: 200px; height: 200px; }
      .planet-rings { width: 300px; height: 70px; }
      .telescope { font-size: 80px; }
      .scene-content { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progress"></div>
  <div class="scroll-hint" id="scrollHint">↓ 向下滚动开启旅程 ↓</div>

  <!-- Scene 1: 开场 -->
  <section class="scene scene-1" data-scene="1">
    <div class="stars" id="stars"></div>
    <div class="scene-content">
      <h2>星际迷途</h2>
      <p>2387年，人类最后一艘探险飞船"极光号"<br>踏上寻找新家园的旅程</p>
    </div>
  </section>

  <!-- Scene 2: 发射 -->
  <section class="scene scene-2" data-scene="2">
    <div class="rocket">🚀<div class="flame"></div></div>
    <div class="scene-content">
      <h2>突破大气层</h2>
      <p>引擎轰鸣，极光号划破夜空<br>地球在身后渐渐远去</p>
    </div>
  </section>

  <!-- Scene 3: 小行星带 -->
  <section class="scene scene-3" data-scene="3">
    <div class="asteroid-field" id="asteroids"></div>
    <div class="scene-content">
      <h2>穿越陨石带</h2>
      <p>前方是危险的小行星群<br>飞船必须灵活闪避每一块碎石</p>
    </div>
  </section>

  <!-- Scene 4: 未知星球 -->
  <section class="scene scene-4" data-scene="4">
    <div class="planet">
      <div class="planet-rings"></div>
    </div>
    <div class="scene-content">
      <h2>发现！</h2>
      <p>一颗神秘的蓝色星球出现在视野中<br>它有光环，有海洋，或许就是人类的新家</p>
    </div>
  </section>

  <!-- Scene 5: 结局 -->
  <section class="scene scene-5" data-scene="5">
    <div class="message message-1">📡 信号已发送...</div>
    <div class="message message-2">🛸 总部已接收</div>
    <div class="message message-3">✨ 准备跳跃</div>
    <div class="telescope">🔭</div>
    <div class="scene-content">
      <h2>下一站：未知</h2>
      <p>极光号将继续前行<br>探索更多宇宙的秘密</p>
    </div>
  </section>

  <section class="finale">
    <h2>— 故事待续 —</h2>
    <button class="restart-btn" onclick="window.scrollTo({top:0, behavior:'smooth'})">重新开始</button>
  </section>

  <script>
    // Generate stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 150; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (2 + Math.random() * 3) + 's');
      star.style.animationDelay = Math.random() * 3 + 's';
      star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
      starsContainer.appendChild(star);
    }

    // Generate asteroids
    const asteroidField = document.getElementById('asteroids');
    for (let i = 0; i < 25; i++) {
      const asteroid = document.createElement('div');
      asteroid.className = 'asteroid';
      const size = 20 + Math.random() * 60;
      asteroid.style.width = size + 'px';
      asteroid.style.height = size + 'px';
      asteroid.style.left = Math.random() * 100 + '%';
      asteroid.style.top = Math.random() * 100 + '%';
      asteroid.style.setProperty('--duration', (8 + Math.random() * 15) + 's');
      asteroid.style.animationDelay = Math.random() * 10 + 's';
      asteroidField.appendChild(asteroid);
    }

    // Scroll-driven animations
    const scenes = document.querySelectorAll('.scene');
    const progressBar = document.getElementById('progress');
    const scrollHint = document.getElementById('scrollHint');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.4 });

    scenes.forEach(scene => observer.observe(scene));

    // Progress bar and scroll hint
    window.addEventListener('scroll', () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = (scrollTop / docHeight) * 100;
      progressBar.style.width = progress + '%';
      
      if (progress > 5) {
        scrollHint.style.opacity = '0';
      }
    });
  </script>
</body>
</html>
