<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown 实时编辑器</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      overflow: hidden;
    }

    .editor-container {
      display: flex;
      height: 100vh;
    }

    .pane {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .pane-header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 13px;
      font-weight: 600;
      color: #8b949e;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pane-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f85149;
    }
    .pane-header .dot.y { background: #f0883e; }
    .pane-header .dot.g { background: #3fb950; }

    .editor-pane {
      border-right: 1px solid #30363d;
    }

    textarea#editor {
      width: 100%;
      height: 100%;
      background: #0d1117;
      color: #e6edf3;
      border: none;
      outline: none;
      resize: none;
      padding: 24px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.7;
      tab-size: 2;
    }

    textarea#editor::placeholder {
      color: #484f58;
    }

    #preview {
      padding: 24px 40px;
      overflow-y: auto;
      background: #0d1117;
      line-height: 1.8;
      font-size: 15px;
    }

    #preview::-webkit-scrollbar { width: 6px; }
    #preview::-webkit-scrollbar-track { background: transparent; }
    #preview::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* Markdown Preview Styles */
    #preview h1, #preview h2, #preview h3, #preview h4, #preview h5, #preview h6 {
      color: #f0f6fc;
      margin: 1.5em 0 0.8em;
      font-weight: 600;
    }
    #preview h1 { font-size: 2em; border-bottom: 1px solid #30363d; padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.5em; border-bottom: 1px solid #21262d; padding-bottom: 0.3em; }
    #preview h3 { font-size: 1.25em; }
    #preview p { margin: 1em 0; }
    #preview a { color: #58a6ff; text-decoration: none; }
    #preview a:hover { text-decoration: underline; }
    #preview code {
      background: #161b22;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', monospace;
      font-size: 0.9em;
      color: #ff7b72;
    }
    #preview pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 1em 0;
    }
    #preview pre code {
      background: none;
      padding: 0;
      color: #e6edf3;
    }
    #preview blockquote {
      border-left: 4px solid #f0883e;
      padding: 8px 16px;
      margin: 1em 0;
      background: #161b22;
      border-radius: 0 8px 8px 0;
      color: #8b949e;
    }
    #preview ul, #preview ol { margin: 1em 0; padding-left: 2em; }
    #preview li { margin: 0.3em 0; }
    #preview table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    #preview th, #preview td { border: 1px solid #30363d; padding: 8px 14px; text-align: left; }
    #preview th { background: #161b22; font-weight: 600; }
    #preview tr:nth-child(even) { background: #161b22; }
    #preview hr { border: none; border-top: 1px solid #30363d; margin: 2em 0; }
    #preview img { max-width: 100%; border-radius: 8px; }

    /* Mermaid diagrams */
    #preview .mermaid {
      background: #1c2128;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      margin: 1em 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }

    .toolbar-btn {
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .toolbar-btn:hover { background: #30363d; border-color: #8b949e; }
    .toolbar-btn.primary { background: #238636; border-color: #2ea043; color: #fff; }
    .toolbar-btn.primary:hover { background: #2ea043; }

    .toolbar-sep { width: 1px; height: 24px; background: #30363d; margin: 0 4px; }

    .word-count {
      margin-left: auto;
      font-size: 12px;
      color: #8b949e;
    }

    @media (max-width: 768px) {
      .editor-container { flex-direction: column; }
      textarea#editor { padding: 16px; font-size: 13px; }
      #preview { padding: 16px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="pane editor-pane">
      <div class="pane-header">
        <span class="dot"></span><span class="dot y"></span><span class="dot g"></span>
        <span style="margin-left:8px">MARKDOWN</span>
        <div class="toolbar">
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn" onclick="insertBold()"><b>B</b></button>
          <button class="toolbar-btn" onclick="insertItalic()"><i>I</i></button>
          <button class="toolbar-btn" onclick="insertLink()">🔗</button>
          <button class="toolbar-btn" onclick="insertCode()">&lt;/&gt;</button>
          <button class="toolbar-btn" onclick="insertImage()">🖼</button>
          <button class="toolbar-btn" onclick="insertMermaid()">📊</button>
          <div class="toolbar-sep"></div>
          <button class="toolbar-btn primary" onclick="copyMarkdown()">📋 复制 MD</button>
          <button class="toolbar-btn" onclick="downloadMarkdown()">💾 下载</button>
          <div class="word-count" id="wordCount">0 字</div>
        </div>
      </div>
      <textarea id="editor" placeholder="# 开始写作吧

左侧输入 Markdown，右侧实时预览

支持 **语法高亮**、📊 Mermaid 图表、`代码块` 等丰富格式

---

## 示例图表

```mermaid
graph TD
    A[输入 Markdown] --> B[解析渲染]
    B --> C[预览输出]
    C --> D{格式检测}
    D -->|代码| E[语法高亮]
    D -->|图表| F[Mermaid]
    D -->|表格| G[表格渲染]
```"></textarea>
    </div>
    <div class="pane">
      <div class="pane-header">
        <span class="dot"></span><span class="dot y"></span><span class="dot g"></span>
        <span style="margin-left:8px">PREVIEW</span>
      </div>
      <div id="preview"></div>
    </div>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const wordCount = document.getElementById('wordCount');

    mermaid.initialize({ 
      startOnLoad: false,
      theme: 'dark',
      themeVariables: {
        primaryColor: '#238636',
        primaryTextColor: '#f0f6fc',
        primaryBorderColor: '#30363d',
        lineColor: '#8b949e',
        secondaryColor: '#161b22',
        tertiaryColor: '#0d1117'
      }
    });

    function updatePreview() {
      const md = editor.value;
      let html = marked.parse(md);
      
      // Process mermaid blocks
      html = html.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g, (match, code) => {
        return `<div class="mermaid">${code.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')}</div>`;
      });
      
      preview.innerHTML = html;
      
      // Highlight code blocks
      preview.querySelectorAll('pre code:not(.language-mermaid)').forEach(block => {
        hljs.highlightElement(block);
      });
      
      // Render mermaid
      mermaid.run({ nodes: preview.querySelectorAll('.mermaid') });
      
      // Word count
      const text = editor.value.trim();
      const chars = text.length;
      const words = text ? text.split(/\s+/).length : 0;
      wordCount.textContent = `${chars} 字 / ${words} 词`;
    }

    function insertBold() {
      wrapSelection('**', '**');
    }
    function insertItalic() {
      wrapSelection('*', '*');
    }
    function insertCode() {
      wrapSelection('`', '`');
    }
    function insertLink() {
      wrapSelection('[', '](url)');
    }
    function insertImage() {
      wrapSelection('![alt](', ')');
    }
    function insertMermaid() {
      const text = `\n\`\`\`mermaid
graph TD
    A[开始] --> B{判断}
    B -->|是| C[结果1]
    B -->|否| D[结果2]
\`\`\`\n`;
      insertAtCursor(text);
    }
    function wrapSelection(before, after) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const text = editor.value;
      const selected = text.substring(start, end) || '文本';
      editor.value = text.substring(0, start) + before + selected + after + text.substring(end);
      editor.selectionStart = start + before.length;
      editor.selectionEnd = start + before.length + selected.length;
      editor.focus();
      updatePreview();
    }
    function insertAtCursor(text) {
      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + text + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + text.length;
      editor.focus();
      updatePreview();
    }
    function copyMarkdown() {
      navigator.clipboard.writeText(editor.value).then(() => {
        const btn = document.querySelector('.toolbar-btn.primary');
        btn.textContent = '✅ 已复制';
        setTimeout(() => btn.textContent = '📋 复制 MD', 1500);
      });
    }
    function downloadMarkdown() {
      const blob = new Blob([editor.value], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'document.md';
      a.click();
    }

    editor.addEventListener('input', updatePreview);
    editor.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(editor.selectionEnd);
        editor.selectionStart = editor.selectionEnd = start + 2;
        updatePreview();
      }
    });

    updatePreview();
  </script>
</body>
</html>
